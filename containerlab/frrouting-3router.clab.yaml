name: frr-router-lab

topology:
  nodes:
    r1:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - ./r1/frr.conf:/etc/frr/frr.conf
        - ./daemons:/etc/frr/daemons
      exec:
        - ip link set eth1 up
        - ip link set eth2 up
      sysctls:
        net.ipv4.ip_forward: 1

    r2:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - ./r2/frr.conf:/etc/frr/frr.conf
        - ./daemons:/etc/frr/daemons
      exec:
        - ip link set eth1 up
        - ip link set eth2 up
      sysctls:
        net.ipv4.ip_forward: 1

    r3:
      kind: linux
      image: frrouting/frr:latest
      binds:
        - ./r3/frr.conf:/etc/frr/frr.conf
        - ./daemons:/etc/frr/daemons
      exec:
        - ip link set eth1 up
        - ip link set eth2 up
      sysctls:
        net.ipv4.ip_forward: 1

  links:
    - endpoints: ["r1:eth1", "r2:eth2"]
    - endpoints: ["r2:eth1", "r3:eth2"]
    - endpoints: ["r3:eth1", "r1:eth2"]
