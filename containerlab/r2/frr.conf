interface eth2
 ip address 10.0.12.2/30
 ip ospf area 4

interface eth1
 ip address 10.0.233.1/30
 ip ospf area 0

interface eth3
 ip address 192.168.12.2/24

interface lo
 ip address 2.2.2.2/32
 ip ospf area 0

router ospf
 ospf router-id 2.2.2.2
 network 10.0.12.0/30 area 4
 network 10.0.23.0/30 area 0

ip route 192.168.1.0/24 Null0
ip route 192.168.3.0/24 10.0.23.2
