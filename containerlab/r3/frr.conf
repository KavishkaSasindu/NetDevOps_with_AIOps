interface eth2
 ip address 10.0.23.2/30
 ip ospf area 0

interface eth1
 ip address 10.0.13.1/30
 ip ospf area 0

interface eth3
 ip address 192.168.3.3/24

interface lo
 ip address 3.3.3.3/32
 ip ospf area 0

router ospf
 ospf router-id 3.3.3.3
 network 10.0.23.0/30 area 0
 network 10.0.13.0/30 area 0

ip route 192.168.1.0/24 10.0.13.2
ip route 192.168.2.0/24 10.0.23.1
